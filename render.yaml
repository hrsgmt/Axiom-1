services:
  - type: web
    name: axiom-api
    runtime: node
    repo: https://github.com/hrsgmt/Axiom-1
    branch: main
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.1.0 --activate && pnpm install && pnpm build:api
    startCommand: pnpm start:api
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: web
    name: axiom-web
    runtime: node
    repo: https://github.com/hrsgmt/Axiom-1
    branch: main
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.1.0 --activate && pnpm install && pnpm build:web
    startCommand: pnpm start:web
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
